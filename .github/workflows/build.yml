name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Windows build and test
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python input_lag_fixer.py --run-tests

      - name: Compile Python files
        run: |
          python -m py_compile input_lag_fixer.py setup.py

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed --name InputLagFixer input_lag_fixer.py

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: InputLagFixer-windows
          path: dist/InputLagFixer.exe
          if-no-files-found: error

      - name: Create draft release for tags
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: dist/InputLagFixer.exe
          generate_release_notes: true
